<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CosMac Star Register Preview</title>
  <link rel="stylesheet" href="/element-auth.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
        Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .mx_AuthPage::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.42)),
        url("/landing/star-main.jpeg") center / cover no-repeat !important;
    }

    .mx_AuthPage_modal {
      display: grid;
      align-items: center;
      min-height: 100vh;
      width: min(100% - 32px, 1160px);
      margin: 0 auto;
      padding: 88px 0;
    }

    .mx_AuthPage_modalContent {
      width: min(100%, 430px);
    }

    .mx_AuthHeader {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      font-size: 28px;
      font-weight: 860;
    }

    .mx_AuthHeader img {
      width: 58px;
      height: 58px;
      object-fit: contain;
    }

    .mx_AuthBody {
      padding: 28px;
    }

    .mx_AuthBody h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1;
    }

    .mx_AuthBody p {
      margin: 0 0 24px;
      color: var(--cosmac-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 16px 0 7px;
      color: rgba(21, 18, 15, 0.68);
      font-size: 13px;
      font-weight: 760;
    }

    input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      font-size: 15px;
    }

    .mx_AccessibleButton_kind_primary {
      width: 100%;
      height: 48px;
      margin-top: 22px;
      border: 0;
      font-size: 15px;
      font-weight: 820;
    }

    .auth-note {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 18px;
      color: rgba(21, 18, 15, 0.52);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="mx_AuthPage">
    <div class="mx_AuthPage_modal">
      <div class="mx_AuthPage_modalContent">
        <header class="mx_AuthHeader">
          <img src="/landing/logo.svg" alt="">
          <span>CosMac Star</span>
        </header>

        <section class="mx_AuthBody">
          <h1>Create account</h1>
          <p>Preview of the CosMac Star registration background for the Element auth page.</p>

          <label for="username">Username</label>
          <input id="username" placeholder="yourname">

          <label for="email">Email</label>
          <input id="email" placeholder="you@example.com">

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••">

          <button class="mx_AccessibleButton_kind_primary" type="button">Register</button>

          <div class="auth-note">
            <span>Already have an account?</span>
            <strong>Sign in</strong>
          </div>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
